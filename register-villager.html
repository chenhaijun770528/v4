<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>村民注册</title>
 <script src="cloud_db.js"></script>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
 .header { display: flex; align-items: center; justify-content: center; position: relative; height: 48px; background: #2E7D32; color: #fff; font-size: 18px; }
 .header-back { position: absolute; left: 12px; cursor: pointer; font-size: 22px; }
 .container { padding: 16px; }
 .form-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 6px #eee; }
 .form-group { margin-bottom: 16px; }
 .form-label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 600; }
 .form-input { width: 100%; height: 44px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
 .form-input:focus { border-color: #2E7D32; }
 .notice-box { background: #E8F5E9; border: 1px solid #A5D6A7; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #2E7D32; line-height: 1.6; }
 .btn-primary { width: 100%; height: 48px; border: none; border-radius: 8px; background: #2E7D32; color: white; font-size: 16px; cursor: pointer; font-weight: bold; }
 .btn-primary:disabled { background: #81C784; cursor: not-allowed; }
 .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; }
 </style>
</head>
<body>
 <div class="header">
 <span class="header-back" onclick="history.back()">←</span>
 <span>🏠 村民入驻注册</span>
 </div>

 <div class="container">
 <div class="form-card">
 <div class="notice-box">
 ⏳ 请填写信息，提交后由<span style="font-weight:bold;">本村村主任审核</span>通过后正式成为村民，届时可登录账号并提交商品上架申请。
 </div>
 <div class="form-group">
 <label class="form-label">姓名 *</label>
 <input class="form-input" id="name" placeholder="请输入真实姓名">
 </div>
 <div class="form-group">
 <label class="form-label">手机号 *（同时作为登录账号）</label>
 <input class="form-input" id="phone" type="tel" placeholder="请输入11位手机号">
 </div>
 <div class="form-group">
 <label class="form-label">设置密码 *（审核通过后用于登录）</label>
 <input class="form-input" id="password" type="password" placeholder="设置密码（6位以上）" maxlength="20">
 </div>
 <div class="form-group">
 <label class="form-label">申请入驻村庄 *</label>
 <select class="form-input" id="villageSelect" style="height:44px;">
 <option value="">-- 请选择村庄 --</option>
 </select>
 <div id="villageLoading" style="font-size:12px;color:#999;margin-top:4px;">加载村庄列表...</div>
 </div>
 </div>
 <button id="submitBtn" class="btn-primary" style="margin-bottom:12px;">提交入驻申请</button>
 <div style="text-align:center;font-size:12px;color:#999;">审核通过后，密码为手机号后6位</div>
 </div>

<script>
(function () {
 var STORAGE_PREFIX = 'village_';
 var Storage = {
 get: function(key, defaultVal) {
 try {
 var raw = localStorage.getItem(STORAGE_PREFIX + key);
 return raw ? JSON.parse(raw) : defaultVal;
 } catch (err) { return defaultVal; }
 },
 set: function(key, val) {
 try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(val)); return true; } catch (err) { return false; }
 }
 };

 var submitBtn = document.getElementById('submitBtn');
 var nameInput = document.getElementById('name');
 var phoneInput = document.getElementById('phone');
 var pwdInput = document.getElementById('password');
 var villageSelect = document.getElementById('villageSelect');
 var villageLoading = document.getElementById('villageLoading');

 submitBtn.addEventListener('click', submit);

 function toast(msg) {
 var t = document.createElement('div');
 t.className = 'toast';
 t.textContent = msg;
 document.body.appendChild(t);
 setTimeout(function() { t.remove(); }, 2000);
 }

 // 加载村庄列表（从已注册的村庄中获取）
 function loadVillages() {
 var villages = Storage.get('villages', []);
 if (villages.length > 0) {
 villages.forEach(function(v) {
 var opt = document.createElement('option');
 opt.value = v.name;
 opt.textContent = v.name + (v.chiefName ? '（村长：' + v.chiefName + '）' : '');
 villageSelect.appendChild(opt);
 });
 villageLoading.textContent = '已加载 ' + villages.length + ' 个村庄';
 } else {
 villageLoading.innerHTML = '<span style="color:#E65100;">⚠️ 暂无注册村庄，请联系平台管理员</span>';
 }
 }
 loadVillages();

 // 同步云端村庄数据
 if (typeof cloudLoad === 'function') {
 cloudLoad().then(function(rows) {
 if (rows && rows.length > 0 && rows[0].data) {
 var cloud = rows[0].data;
 if (cloud.villages && cloud.villages.length > 0) {
 Storage.set('villages', cloud.villages);
 villageSelect.innerHTML = '<option value="">-- 请选择村庄 --</option>';
 cloud.villages.forEach(function(v) {
 var opt = document.createElement('option');
 opt.value = v.name;
 opt.textContent = v.name + (v.chiefName ? '（村长：' + v.chiefName + '）' : '');
 villageSelect.appendChild(opt);
 });
 villageLoading.textContent = '已加载 ' + cloud.villages.length + ' 个村庄（云端）';
 }
 }
 }).catch(function() {});
 }

 async function submit() {
 if (submitBtn.disabled) return;
 var name = nameInput.value.trim();
 var phone = phoneInput.value.trim();
 var password = pwdInput.value.trim();
 var village = villageSelect.value.trim();

 if (!name) { alert('请输入姓名'); nameInput.focus(); return; }
 if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { alert('请输入正确的11位手机号'); phoneInput.focus(); return; }
 if (!password || password.length < 6) { alert('密码至少6位'); pwdInput.focus(); return; }
 if (!village) { alert('请选择入驻村庄'); return; }

 submitBtn.disabled = true;
 submitBtn.textContent = '提交中...';

 var regData = {
 id: 'r_' + Date.now(),
 name: name,
 phone: phone,
 village: village,
 role: '村民',
 status: '待村主任审核',
 createdAt: Date.now()
 };

 // 本地保存申请
 var regs = Storage.get('registrations', []);
 // 防重复提交
 var dup = false;
 for (var i = 0; i < regs.length; i++) {
 if (regs[i].phone === phone && regs[i].role === '村民') { dup = true; break; }
 }
 if (dup) {
 alert('您已提交过村民入驻申请，请等待村主任审核！');
 submitBtn.disabled = false; submitBtn.textContent = '提交入驻申请';
 return;
 }
 regs.push(regData);
 Storage.set('registrations', regs);

 // 云端同步申请（不阻塞主流程）
 if (typeof cloudAddRegistration === 'function') {
 cloudAddRegistration(regData).catch(function() {});
 }

 // 自动临时登录（仅当前设备，可查看个人中心但不能正式登录）
 var tempUser = {
 id: 'u_' + Date.now(),
 account: phone,
 phone: phone,
 nickName: name,
 role: '村民（待审核）',
 village: village,
 createTime: Date.now()
 };
 Storage.set('user', tempUser);

    // 同时写入 accounts 表（待审核状态），允许退出后重新登录
    var accounts = Storage.get('accounts', []);
    var accExists = false;
    for (var ai = 0; ai < accounts.length; ai++) {
      if (accounts[ai].phone === phone) { accExists = true; break; }
    }
    if (!accExists) {
      accounts.push({
        id: 'acc_' + Date.now(),
        account: phone,
        phone: phone,
        nickName: name,
        role: '村民\uff08\u5f85\u5ba1\u6838\uff09',
        village: village,
        status: 'pending',
        password: password,
        createTime: Date.now()
      });
      Storage.set('accounts', accounts);
    }

 alert('✅ 入驻申请已提交！\n\n请等待本村村主任审核通过。\n审核结果可在个人中心查看。');
 submitBtn.textContent = '已提交';
 setTimeout(function() { location.href = 'profile.html'; }, 1500);
 }
})();
</script>
</body>
</html>
