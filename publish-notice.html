<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布全平台公告</title>
<script src="cloud_db.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,'Microsoft YaHei',sans-serif}
body{background:#f5f5f5;color:#333;min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;height:48px;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;display:flex;align-items:center;z-index:100;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.header-back{font-size:22px;cursor:pointer;padding:4px 8px;border:none;background:none;color:#fff}
.header-title{flex:1;text-align:center;font-size:18px;font-weight:600}
.header-right{width:36px}
.container{padding:68px 16px 24px}
.form-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:8px;font-size:15px;font-weight:600;color:#333}
.form-group input,.form-group textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;line-height:1.5;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group textarea:focus{border-color:#2E7D32}
.form-group textarea{min-height:160px;resize:vertical}
.tips{font-size:12px;color:#999;margin-top:6px}
.btn-submit{width:100%;padding:14px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:background 0.2s}
.btn-submit:disabled{background:#81C784;cursor:not-allowed}
.btn-submit:active:not(:disabled){background:#1B5E20}
</style>
</head>
<body>
<div class="header">
  <span class="header-back" onclick="history.back()">&#8592;</span>
  <span class="header-title">发布全平台公告</span>
  <span class="header-right"></span>
</div>
<div class="container">
  <div class="form-card">
    <div class="form-group">
      <label>公告标题 *</label>
      <input id="noticeTitle" placeholder="请输入公告标题" maxlength="50">
      <div class="tips">最多50个字符</div>
    </div>
    <div class="form-group">
      <label>公告内容 *</label>
      <textarea id="noticeContent" placeholder="请输入详细通知内容，支持多行文本"></textarea>
    </div>
    <button class="btn-submit" id="submitBtn">发布公告</button>
  </div>
</div>
<script>
var Storage = {
  get: function(key, defaultVal) {
    try {
      var raw = localStorage.getItem('village_' + key);
      return raw ? JSON.parse(raw) : defaultVal;
    } catch(e) { return defaultVal; }
  },
  set: function(key, val) {
    try {
      localStorage.setItem('village_' + key, JSON.stringify(val));
      return true;
    } catch(e) { return false; }
  }
};

// 权限拦截：仅管理员可访问
var loginUser = Storage.get('user', null);
if (!loginUser || loginUser.role !== '管理员') {
  alert('仅平台管理员可发布公告');
  location.href = 'profile.html';
}

var submitBtn = document.getElementById('submitBtn');
var titleInput = document.getElementById('noticeTitle');
var contentInput = document.getElementById('noticeContent');

submitBtn.onclick = function() {
  var title = titleInput.value.trim();
  var content = contentInput.value.trim();

  if (!title) {
    alert('请填写公告标题');
    titleInput.focus();
    return;
  }
  if (!content) {
    alert('请填写公告内容');
    contentInput.focus();
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '发布中...';

  var noticeData = {
    id: 'notice_' + Date.now(),
    title: title,
    content: content,
    createTime: Date.now(),
    isAdminNotice: true
  };

  // 本地存储
  var noticeList = Storage.get('notice_list', []);
  noticeList.unshift(noticeData);
  Storage.set('notice_list', noticeList);

  // 云端同步
  if (typeof cloudSaveNotice === 'function') {
    cloudSaveNotice(noticeList).then(function() {
      submitBtn.disabled = false;
      submitBtn.textContent = '发布公告';
      alert('公告发布成功，全平台首页可见！');
      titleInput.value = '';
      contentInput.value = '';
    }).catch(function(err) {
      submitBtn.disabled = false;
      submitBtn.textContent = '发布公告';
      alert('本地保存成功，云端同步失败，不影响本地展示');
      console.error('cloudSaveNotice error:', err);
    });
  } else {
    submitBtn.disabled = false;
    submitBtn.textContent = '发布公告';
    alert('公告发布成功（仅本地）！');
    titleInput.value = '';
    contentInput.value = '';
  }
};
</script>
</body>
</html>
