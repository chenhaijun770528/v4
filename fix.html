<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一键修复 - 切换到 CHENWEI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
.box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
h1 { color: #F44336; margin: 0 0 16px 0; font-size: 22px; }
.info { background: #FFEBEE; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 14px; line-height: 1.8; }
.btn { background: #2E7D32; color: white; border: none; padding: 16px 20px; border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer; margin: 8px 0; font-weight: bold; }
.btn:hover { background: #1B5E20; }
pre { background: #f5f5f5; padding: 10px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<h1>🔧 一键修复 - 切换到 CHENWEI 账号</h1>
<div class="box">
  <div class="info">
    <b>当前 localStorage 数据：</b>
    <pre id="currentData">读取中...</pre>
  </div>
  <button class="btn" onclick="doFix()">🔧 点我：清空并切换到 CHENWEI</button>
  <div id="result" class="info" style="display:none"></div>
</div>
<script>
function showCurrent() {
  var info = '';
  var keys = Object.keys(localStorage).sort();
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var v = localStorage.getItem(k);
    if (v.length > 200) v = v.substring(0, 200) + '...';
    info += '[' + k + ']:
' + v + '

';
  }
  if (info === '') info = '(空)';
  document.getElementById('currentData').textContent = info;
}

function doFix() {
  if (!confirm('确认要清空所有 localStorage 并切换到 CHENWEI 账号吗？')) return;
  
  // 1. 清空所有 village_ 开头的数据
  var removed = [];
  Object.keys(localStorage).forEach(function(k) {
    if (k.indexOf('village_') === 0 || k === 'user') {
      removed.push(k);
      localStorage.removeItem(k);
    }
  });
  
  // 2. 设置 CHENWEI 用户
  var chenwei = {
    account: 'chenwei',
    id: 'chenwei',
    username: 'chenwei',
    name: '陈威',
    phone: '18351784298',
    currentRole: 'landscape',
    _loginTime: Date.now()
  };
  localStorage.setItem('village_user', JSON.stringify(chenwei));
  localStorage.setItem('village_current_user', JSON.stringify(chenwei));
  localStorage.setItem('user', JSON.stringify(chenwei));
  
  // 3. 显示结果
  var result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = '<b>✅ 已清空 ' + removed.length + ' 个 key</b><br>' +
    '已删除: ' + removed.join(', ') + '<br><br>' +
    '<b>已设置 CHENWEI 账号</b><br>' +
    'account: chenwei<br>' +
    'username: chenwei<br>' +
    'name: 陈威<br>' +
    'currentRole: landscape (园林设计师)<br><br>' +
    '<b>3 秒后自动跳转到个人中心...</b>';
  
  setTimeout(function() {
    location.href = 'my.html';
  }, 3000);
}

showCurrent();
</script>
</body>
</html>
