<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>个人中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333;min-height:100vh;}
</style>
</head>
<body>
<div id="mainContent"></div>
<script>
// ===================================================================
// profile.html - 个人中心
// 核心原则：
// 1. 每次打开页面，先从云端拉取最新数据覆盖本地，再渲染
// 2. 显示所有状态的申请（待审核/已通过/已拒绝）
// 3. 管理员审核后，其他设备重新打开此页即可看到最新状态
// ===================================================================
(function() {
  // 避免重复加载
  if (window._profileInited) return;
  window._profileInited = true;

  var SUPABASE_URL = 'https://eivqbbxyllsorbvgqsju.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdnFiYnh5bGxzb3Jidmdxc2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTIzMDksImV4cCI6MjA5ODI4ODMwOX0.QeKnbo1cgA0yGMOEydML3PNXatH1V1QXfW0hyxRy7KY';

  var Storage = {
    get: function(k, def) {
      try { var v = localStorage.getItem('village_' + k); return v ? JSON.parse(v) : def; } catch(e) { return def; }
    },
    set: function(k, v) {
      try { localStorage.setItem('village_' + k, JSON.stringify(v)); } catch(e) {}
    }
  };

  // ===== 步骤1: 从云端同步所有数据到本地 =====
  function syncFromCloud(callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', SUPABASE_URL + '/rest/v1/village_data?id=eq.init&select=data', true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.timeout = 8000;
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try {
            var arr = JSON.parse(xhr.responseText);
            if (arr.length > 0 && arr[0].data) {
              var cloud = arr[0].data;
              // 用云端数据覆盖本地缓存（关键！）
              if (cloud.registrations) Storage.set('registrations', cloud.registrations);
              if (cloud.accounts) Storage.set('accounts', cloud.accounts);
              if (cloud.villages) Storage.set('villages', cloud.villages);
              if (cloud.announcements) Storage.set('announcements', cloud.announcements);
              console.log('[profile] 云端同步成功，registrations=' + (cloud.registrations ? cloud.registrations.length : 0));
            }
          } catch(e) {
            console.log('[profile] 云端解析失败:', e.message);
          }
        } else {
          console.log('[profile] 云端请求失败:', xhr.status);
        }
        callback();
      }
    };
    xhr.onerror = function() { console.log('[profile] 云端网络错误'); callback(); };
    xhr.ontimeout = function() { console.log('[profile] 云端请求超时'); callback(); };
    xhr.send();
  }

  // ===== 步骤2: 渲染页面（从本地读取数据） =====
  function renderPage() {
    var mainEl = document.getElementById('mainContent');
    if (!mainEl) return;

    var currentUser = Storage.get('user', null);

    // --- 未登录状态 ---
    if (!currentUser) {
      mainEl.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#999;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🔒</div>' +
        '<p style="font-size:16px;margin-bottom:24px;">请先登录后再访问个人中心</p>' +
        '<button onclick="location.href=\'login.html\'" style="padding:12px 32px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">去登录</button>' +
        '</div>';
      return;
    }

    // --- 已登录，读取本地数据（已被云端同步覆盖） ---
    var allRegs = Storage.get('registrations', []);
    var allAccounts = Storage.get('accounts', []);
    var userAccount = (currentUser.username || currentUser.account || currentUser.id || '').toLowerCase();
    var userPhone = currentUser.phone || '';

    // 匹配当前用户的申请记录
    var myRegs = allRegs.filter(function(item) {
      var regAccount = (item.account || item.username || '').toLowerCase();
      var regPhone = item.phone || '';
      return (regPhone && regPhone === userPhone) || (regAccount && regAccount === userAccount);
    });

    // ===== 核心修复：从云端账号库中查找自己的正式账号，同步角色 =====
    // 管理员审核通过后，会在 accounts 里创建正式账号（含角色）
    // 每次打开个人中心，用正式账号的角色覆盖当前用户角色（持久生效）
    if (allAccounts.length > 0) {
      var myFormalAccount = null;
      for (var ai = 0; ai < allAccounts.length; ai++) {
        var accPhone = allAccounts[ai].phone || '';
        var accAccount = (allAccounts[ai].account || allAccounts[ai].username || '').toLowerCase();
        if ((userPhone && accPhone === userPhone) || (userAccount && accAccount === userAccount)) {
          myFormalAccount = allAccounts[ai];
          break;
        }
      }
      if (myFormalAccount) {
        var formalRole = myFormalAccount.role || myFormalAccount.currentRole || '';
        if (formalRole && currentUser.role !== formalRole) {
          console.log('[profile] 从正式账号同步角色: ' + currentUser.role + ' -> ' + formalRole);
          currentUser.role = formalRole;
          currentUser.currentRole = formalRole;
          Storage.set('user', currentUser);
        }
      }
    }

    // ===== 从已通过的申请中同步用户角色（兜底） =====
    // 如果有待审核通过的申请，用申请的角色更新登录用户的角色
    var passedRegs = allRegs.filter(function(item) {
      var regAccount = (item.account || item.username || '').toLowerCase();
      var regPhone = item.phone || '';
      return ((regPhone && regPhone === userPhone) || (regAccount && regAccount === userAccount)) && item.status === '已通过';
    });
    if (passedRegs.length > 0) {
      // 用第一条已通过申请的角色更新用户角色
      var realRole = passedRegs[0].role || passedRegs[0].type || '普通用户';
      if (currentUser.role !== realRole) {
        console.log('[profile] 角色同步：' + currentUser.role + ' -> ' + realRole);
        currentUser.role = realRole;
        currentUser.currentRole = realRole;
        Storage.set('user', currentUser); // 持久化到本地
      }
    }

    // 当前角色（已包含审核通过后的同步角色）
    var currentRole = currentUser.currentRole || currentUser.role || '普通用户';

    // 构建HTML
    var html = '';

    // --- 用户信息卡片 ---
    html += '<div style="background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;padding:24px 20px;border-radius:0 0 24px 24px;text-align:center;">';
    html += '<div style="font-size:48px;margin-bottom:8px;">👤</div>';
    html += '<div style="font-size:18px;font-weight:bold;margin-bottom:4px;">' + (currentUser.nickName || currentUser.username || '用户') + '</div>';
    var roleBg = currentRole !== '普通用户' ? '#fff;color:#2E7D32' : '#rgba(255,255,255,0.3);color:#fff';
    html += '<span style="display:inline-block;padding:4px 16px;border-radius:20px;font-size:13px;background:' + roleBg + ';">' + currentRole + '</span>';
    html += '</div>';

    // --- 云端同步状态提示 ---
    html += '<div style="text-align:center;padding:8px;font-size:12px;color:#999;background:#f9f9f9;">☁️ 每次打开自动同步云端最新数据</div>';

    // --- 申请记录卡片 ---
    if (myRegs.length > 0) {
      html += '<div style="padding:16px;">';
      myRegs.forEach(function(reg) {
        var statusClass = reg.status === '已通过' ? 'background:#E8F5E9;color:#2E7D32' :
                          reg.status === '已拒绝' ? 'background:#FFEBEE;color:#F44336' :
                          'background:#FFF8E1;color:#F57C00';
        var statusIcon = reg.status === '已通过' ? '✅' :
                         reg.status === '已拒绝' ? '❌' : '⏳';
        var timeStr = reg.createdAt ? (function() {
          var d = new Date(reg.createdAt);
          return isNaN(d.getTime()) ? '' : d.toLocaleString('zh-CN');
        })() : '';

        html += '<div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        html += '<span style="font-weight:bold;font-size:15px;color:#333;">' + (reg.role || reg.type || '未知角色') + '</span>';
        html += '<span style="padding:2px 10px;border-radius:12px;font-size:12px;' + statusClass + ';">' + statusIcon + ' ' + (reg.status || '未知') + '</span>';
        html += '</div>';
        if (reg.village) html += '<div style="font-size:13px;color:#666;margin-bottom:4px;">🏠 村庄: ' + reg.village + '</div>';
        if (reg.name) html += '<div style="font-size:13px;color:#666;margin-bottom:4px;">👤 姓名: ' + reg.name + '</div>';
        if (timeStr) html += '<div style="font-size:12px;color:#999;">🕐 申请时间: ' + timeStr + '</div>';
        if (reg.status === '已通过') {
          html += '<div style="margin-top:8px;padding:8px;background:#E8F5E9;border-radius:6px;font-size:13px;color:#2E7D32;">🎉 恭喜！您的申请已审核通过！</div>';
        } else if (reg.status === '已拒绝') {
          html += '<div style="margin-top:8px;padding:8px;background:#FFEBEE;border-radius:6px;font-size:13px;color:#F44336;">😢 很遗憾，您的申请未通过审核</div>';
        } else {
          html += '<div style="margin-top:8px;padding:8px;background:#FFF8E1;border-radius:6px;font-size:13px;color:#F57C00;">⏳ 您的申请正在审核中，请耐心等待本村村主任处理</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    } else {
      // 仅无角色用户才提示去选角色；已有角色（村主任/村民/技师等）不显示此提示
      if (currentRole === '普通用户') {
        html += '<div style="padding:32px 20px;text-align:center;color:#999;">' +
          '<div style="font-size:40px;margin-bottom:12px;">📝</div>' +
          '<p style="font-size:14px;margin-bottom:16px;">您还没有提交过角色申请</p>' +
          '<button onclick="location.href=\'index.html\'" style="padding:10px 24px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">去选择一个角色</button>' +
          '</div>';
      }
    }

    // --- 快捷菜单 ---
    html += '<div style="padding:0 16px;">';
    html += '<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">';

    var menus = [
      { icon: '🏠', text: '返回首页', action: "location.href='index.html'" }
    ];
    // 管理员专属菜单
    if (currentRole === '管理员') {
      menus.push({ icon: '⚙️', text: '管理后台', action: "location.href='admin_v2.html'" });
      menus.push({ icon: '📢', text: '发布全平台公告', action: "location.href='publish-notice.html'" });
    }
    // 村主任专属菜单
    if (currentRole === '村主任') {
      menus.push({ icon: '👥', text: '本村入驻审核', action: "location.href='audit-villager.html'" });
      menus.push({ icon: '📦', text: '本村商品审核', action: "location.href='audit-goods.html'" });
    }
    // 村民专属菜单
    if (currentRole === '村民') {
      menus.push({ icon: '✍️', text: '提交上架申请', action: "location.href='submit-goods.html'" });
    }
    // 按摩技师专属菜单（区分：首次提交 vs 编辑已有资料）
    if (currentRole === '按摩技师') {
      var userPhone = currentUser.phone || currentUser.account || '';
      var techList = Storage.get('technician_list', []);
      var myApprovedTech = techList.find(function(t) { return t.phone === userPhone; });
      if (myApprovedTech) {
        menus.push({ icon: '💆', text: '我的技师资料（编辑）', action: "location.href='my-technician.html'" });
      } else {
        menus.push({ icon: '💆', text: '提交技师服务上架申请', action: "location.href='submit-technician.html'" });
      }
    }
    // 通用菜单
    menus.push({ icon: '🔄', text: '手动刷新云端数据', action: "manualRefresh()" });
    menus.push({ icon: '🚪', text: '退出登录', action: "doLogout()" });
    menus.forEach(function(menu) {
      html += '<div onclick="' + menu.action + '" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:14px;color:#333;">' +
        '<span><span style="font-size:18px;margin-right:10px;">' + menu.icon + '</span>' + menu.text + '</span>' +
        '<span style="color:#ccc;font-size:18px;">›</span>' +
        '</div>';
    });
    html += '</div>';
    html += '</div>';

    mainEl.innerHTML = html;
  }

  // ===== 步骤3: 手动刷新（用户点击按钮时） =====
  window.manualRefresh = function() {
    var mainEl = document.getElementById('mainContent');
    if (mainEl) mainEl.innerHTML = '<div style="padding:40px;text-align:center;color:#2E7D32;">🔄 正在同步云端数据...</div>';
    syncFromCloud(function() {
      renderPage();
    });
  };

  // ===== 步骤4: 退出登录 =====
  window.doLogout = function() {
    if (confirm('确定要退出登录吗？')) {
      Storage.set('user', null);
      location.href = 'login.html';
    }
  };

  // ===== 步骤5: 初始化 =====
  function init() {
    var mainEl = document.getElementById('mainContent');
    if (!mainEl) {
      mainEl = document.createElement('div');
      mainEl.id = 'mainContent';
      document.body.appendChild(mainEl);
    }
    // 先显示加载状态
    mainEl.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#2E7D32;">' +
      '<div style="font-size:32px;margin-bottom:12px;">☁️</div>' +
      '<div style="font-size:14px;">正在同步云端数据...</div>' +
      '<div style="font-size:12px;color:#999;margin-top:8px;">请稍候</div>' +
      '</div>';

    // 先同步云端，再渲染（核心！）
    syncFromCloud(function() {
      renderPage();
    });
  }

  // 等待 DOM 加载
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
