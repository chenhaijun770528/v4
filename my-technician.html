<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的技师资料</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#f5f5f5;min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;padding:12px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:18px;font-weight:bold}
.header-back{font-size:22px;cursor:pointer;padding:4px 8px}
.container{padding:60px 16px 20px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card-title{font-size:16px;font-weight:bold;color:#333;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #eee}
.form-group{margin-bottom:14px}
label{display:block;margin-bottom:6px;font-size:14px;color:#333;font-weight:600}
label .required{color:#E53935;margin-left:2px}
input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px}
input:focus,textarea:focus{outline:none;border-color:#2E7D32;box-shadow:0 0 0 2px rgba(46,125,50,0.1)}
textarea{resize:vertical;min-height:80px}
.tips{font-size:12px;color:#999;margin-top:4px}
.btn-save{width:100%;padding:14px;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-save:disabled{opacity:0.6;cursor:not-allowed}
.notice{background:#E8F5E9;border-radius:8px;padding:12px 14px;font-size:13px;color:#2E7D32;margin-bottom:16px;line-height:1.6}
.notice strong{color:#1B5E20}
.user-info{background:#fff;border-radius:8px;padding:12px 14px;font-size:13px;color:#666;margin-bottom:16px;border:1px solid #e0e0e0}
.user-info div{margin:3px 0}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:999;display:none}
.loading-box{background:#fff;border-radius:12px;padding:24px 32px;text-align:center;font-size:15px;color:#333}
.no-data{text-align:center;padding:60px 20px;color:#999}
.no-data-icon{font-size:60px;display:block;margin-bottom:16px}
</style>
</head>
<body>
<div class="header">
  <span class="header-back" onclick="location.href='profile.html'">←</span>
  <span class="header-title">💆 我的技师资料</span>
  <span style="width:40px"></span>
</div>

<div class="container" id="app">
  <div class="no-data">
    <span class="no-data-icon">⏳</span>
    加载中...
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">保存中，请稍候...</div>
</div>

<script src="cloud_db.js"></script>
<script>
(function() {
  var Storage = {
    get: function(k, def) {
      try { var v = localStorage.getItem('village_' + k); return v ? JSON.parse(v) : def; }
      catch(e) { return def; }
    },
    set: function(k, v) {
      try { localStorage.setItem('village_' + k, JSON.stringify(v)); return true; }
      catch(e) { return false; }
    }
  };

  var currentUser = Storage.get('user', null);
  var app = document.getElementById('app');

  if (!currentUser) {
    app.innerHTML = '<div class="no-data"><span class="no-data-icon">🔒</span>请先登录<br><br><a href="login.html" style="color:#2E7D32;">去登录</a></div>';
    return;
  }

  var userPhone = currentUser.phone || currentUser.account || '';
  var userRole = currentUser.currentRole || currentUser.role || '';

  if (userRole !== '按摩技师') {
    app.innerHTML = '<div class="no-data"><span class="no-data-icon">🚫</span>仅按摩技师可访问<br><br><a href="profile.html" style="color:#2E7D32;">返回个人中心</a></div>';
    return;
  }

  // 从云端同步加载数据
  loadMyData();

  function loadMyData() {
    if (typeof cloudLoad === 'function') {
      cloudLoad().then(function(rows) {
        var cd = { technician_list: [] };
        if (rows && rows.length > 0 && rows[0].data) cd = Object.assign(cd, rows[0].data);
        Storage.set('technician_list', cd.technician_list || []);
        var tech = (cd.technician_list || []).find(function(t) { return t.phone === userPhone; });
        renderPage(tech);
      }).catch(function() {
        // 云端失败，读取本地
        var techList = Storage.get('technician_list', []);
        var tech = techList.find(function(t) { return t.phone === userPhone; });
        renderPage(tech);
      });
    } else {
      var techList = Storage.get('technician_list', []);
      var tech = techList.find(function(t) { return t.phone === userPhone; });
      renderPage(tech);
    }
  }

  function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderPage(tech) {
    if (!tech) {
      app.innerHTML = '<div class="no-data"><span class="no-data-icon">📋</span>暂无已通过的技师资料<br><br>请先提交上架申请<br><br><a href="submit-technician.html" style="color:#2E7D32;font-weight:bold;">去申请 →</a></div>';
      return;
    }

    app.innerHTML = '<div class="notice">✏️ 编辑资料后直接保存，无需审核，首页实时更新。</div>' +
      '<div class="user-info">' +
        '<div>👤 姓名：' + esc(tech.userName || '') + '</div>' +
        '<div>📱 电话：' + esc(tech.phone || '') + '</div>' +
        '<div>🏘️ 村庄：' + esc(tech.village || '') + '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">📝 编辑服务信息</div>' +
        '<div class="form-group">' +
          '<label>服务项目 <span class="required">*</span></label>' +
          '<input id="serviceItem" value="' + esc(tech.serviceItem || '') + '" placeholder="例如：推拿、足疗、肩颈按摩">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>从业年限 <span class="required">*</span></label>' +
          '<input id="workYear" value="' + esc(tech.workYear || '') + '" placeholder="例如：3年">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>详细地址 <span class="required">*</span></label>' +
          '<input id="address" value="' + esc(tech.address || '') + '" placeholder="XX村X组XX号">' +
          '<div class="tips">地址修改后立即生效，无需审核</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label>服务简介</label>' +
          '<textarea id="desc" placeholder="介绍自身服务特色、资质等">' + esc(tech.desc || '') + '</textarea>' +
        '</div>' +
        '<button class="btn-save" id="saveBtn" onclick="saveForm()">💾 保存修改（无需审核）</button>' +
      '</div>' +
      '<div style="text-align:center;padding-bottom:20px;">' +
        '<a href="profile.html" style="color:#2E7D32;font-size:14px;text-decoration:none;">← 返回个人中心</a>' +
      '</div>';
  }

  window.saveForm = function() {
    var serviceItem = document.getElementById('serviceItem').value.trim();
    var workYear = document.getElementById('workYear').value.trim();
    var address = document.getElementById('address').value.trim();
    var desc = document.getElementById('desc').value.trim();

    if (!serviceItem) { alert('服务项目不能为空'); return; }
    if (!workYear) { alert('从业年限不能为空'); return; }
    if (!address) { alert('详细地址不能为空'); return; }

    var btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';
    showLoading(true);

    // 更新本地 technician_list
    var techList = Storage.get('technician_list', []);
    var idx = techList.findIndex(function(t) { return t.phone === userPhone; });
    if (idx >= 0) {
      techList[idx].serviceItem = serviceItem;
      techList[idx].workYear = workYear;
      techList[idx].address = address;
      techList[idx].desc = desc;
      Storage.set('technician_list', techList);

      // 云端同步
      if (typeof cloudSaveTechnicianList === 'function') {
        cloudSaveTechnicianList(techList).then(function() {
          showLoading(false);
          alert('✅ 资料修改成功！首页按摩板块已同步更新。');
          btn.disabled = false;
          btn.textContent = '💾 保存修改（无需审核）';
        }).catch(function() {
          showLoading(false);
          alert('✅ 本地保存成功，首页已更新（云端同步失败，刷新后可见最新）');
          btn.disabled = false;
          btn.textContent = '💾 保存修改（无需审核）';
        });
      } else {
        showLoading(false);
        alert('✅ 资料修改成功！首页按摩板块已同步更新。');
        btn.disabled = false;
        btn.textContent = '💾 保存修改（无需审核）';
      }
    } else {
      showLoading(false);
      alert('⚠️ 数据异常，未找到您的技师记录，请重新提交上架申请');
      btn.disabled = false;
      btn.textContent = '💾 保存修改（无需审核）';
    }
  };

  function showLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }
})();
</script>
</body>
</html>
